services:
  streamcanvas-web:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: streamcanvas-web
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((res)=>{if(!res.ok) process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: https://codeclaude.cn
      PORT: "3000"
      SITE_URL: https://codeclaude.cn
    ports:
      - "127.0.0.1:3210:3000"
    restart: unless-stopped
